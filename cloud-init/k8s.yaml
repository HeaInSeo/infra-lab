#cloud-config
package_update: true
package_upgrade: false
packages:
  - ca-certificates
  - curl
  - gpg
  - apt-transport-https
  - iproute2
  - socat
  - conntrack
  - ebtables
  - ethtool
  - net-tools
  - bash-completion

write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

  - path: /etc/sysctl.d/99-k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
      fs.inotify.max_user_instances = 8192
      fs.inotify.max_user_watches = 524288
      vm.swappiness = 0

runcmd:
  - swapoff -a
  - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
  - systemctl list-units --type=swap --all --no-legend | awk '{print $1}' | xargs -r systemctl mask --now
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system
  - mkdir -p /etc/apt/keyrings
  - sh -c 'curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg'
  - chmod 644 /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - sh -c 'echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /" > /etc/apt/sources.list.d/kubernetes.list'
  - apt-get update
  - sh -c 'KUBE_VERSION=1.32.5; apt-get install -y containerd "kubelet=${KUBE_VERSION}-*" "kubeadm=${KUBE_VERSION}-*" "kubectl=${KUBE_VERSION}-*"'
  - apt-mark hold kubelet kubeadm kubectl containerd
  - mkdir -p /etc/containerd
  - containerd config default > /etc/containerd/config.toml
  - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  - systemctl enable --now containerd
  - systemctl enable --now kubelet
