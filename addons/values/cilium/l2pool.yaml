---
# CiliumLoadBalancerIPPool — L2 LB IP 풀
# EXTERNAL-IP 10.113.24.96 → nodevault.10.113.24.96.nip.io 에 대응
# 환경에 따라 spec.blocks[].cidr 를 수정할 것
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: lab-default-pool
spec:
  blocks:
    - cidr: "10.113.24.96/32"
---
# CiliumL2AnnouncementPolicy — 위 풀의 IP를 L2(ARP)로 광고
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: lab-default-l2
spec:
  loadBalancerIPs: true
  interfaces:
    - ^eth.*
    - ^enp.*
    - ^ens.*
