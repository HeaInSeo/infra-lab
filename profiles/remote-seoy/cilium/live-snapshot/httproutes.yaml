apiVersion: v1
kind: List
items:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: harbor-route
      namespace: harbor
    spec:
      hostnames:
        - harbor.10.113.24.96.nip.io
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: lab-gateway
          namespace: harbor
          sectionName: http
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: lab-gateway
          namespace: harbor
          sectionName: https
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - group: ""
              kind: Service
              name: harbor
              port: 80
              weight: 1
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: dev-space-observability
      namespace: dev-space
    spec:
      hostnames:
        - dev-space.10.113.24.96.nip.io
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: lab-gateway
          namespace: harbor
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - group: ""
              kind: Service
              name: dev-space-observability
              port: 80
              weight: 1
