---
# Harbor HTTPRoute — Cilium Gateway를 통해 Harbor 웹 UI + API 노출
#
# 전제 조건:
#   - 이 파일은 generic / future-facing 예제에 가깝다.
#   - remote-seoy live 기준선은 profiles/remote-seoy/cilium 을 본다.
#   - Harbor Helm 설치 (harbor 네임스페이스)
#   - Gateway k8s/gateway/01-gateway.yaml 적용 완료
#   - Legacy example only. Current seoy Harbor uses HTTPS Gateway hostname
#     harbor.lab.local; do not use this nip.io HTTP endpoint for NodeVault.
#   - cross-namespace parentRef 허용은 Gateway listener.allowedRoutes 설정으로 결정된다.
#
# Harbor Helm values 핵심 설정:
#   externalURL: http://harbor.10.113.24.96.nip.io
#   expose.type: clusterIP
#   expose.clusterIP.name: harbor
#
# seoy live 진단은 scripts/host/harbor-gateway-diagnose.sh 를 사용한다.
# ping/ICMP 실패만으로 Cilium Gateway 장애로 판단하지 않는다.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: nodevault-system
  hostnames:
    - "harbor.10.113.24.96.nip.io"
  rules:
    - backendRefs:
        - name: harbor
          port: 80
