name: check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run shell checks
        run: make lint-shell

  hcl:
    name: OpenTofu
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Run HCL checks
        run: make lint-hcl

  yaml:
    name: YAML
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install python3-yaml
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-yaml

      - name: Run YAML checks
        run: make lint-yaml

  go:
    name: Go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ilab/go.mod
          cache-dependency-path: ilab/go.sum

      - name: Run Go checks
        run: make lint-go

      - name: Run Go tests
        run: make test-go
